<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 멘토링 제안 등록</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        form { margin-top: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        div { margin-bottom: 10px; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        input[type="text"], input[type="number"], textarea, select { width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        textarea { height: 100px; resize: vertical; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>새 멘토링 제안 등록</h1>

    <form th:action="@{/mypage/activity/mentoringoffers/new}" th:object="${mentoringOfferCreateRequest}" method="post">
        <div>
            <label for="title">제목:</label>
            <input type="text" id="title" th:field="*{title}" required />
            <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></span>
        </div>
        <div>
            <label for="description">설명:</label>
            <textarea id="description" th:field="*{description}" required></textarea>
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error"></span>
        </div>
        <div>
            <label for="price">가격:</label>
            <input type="number" id="price" th:field="*{price}" required min="0" />
            <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="error"></span>
        </div>
        <div>
            <label for="duration">기간:</label>
            <input type="text" id="duration" th:field="*{duration}" placeholder="예: 1개월, 3회" />
            <span th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}" class="error"></span>
        </div>
        <div>
            <label for="location">장소:</label>
            <input type="text" id="location" th:field="*{location}" placeholder="예: 온라인, 강남역 스터디룸" />
            <span th:if="${#fields.hasErrors('location')}" th:errors="*{location}" class="error"></span>
        </div>
        <div>
            <label for="maxParticipants">최대 참여 인원:</label>
            <input type="number" id="maxParticipants" th:field="*{maxParticipants}" required min="1" />
            <span th:if="${#fields.hasErrors('maxParticipants')}" th:errors="*{maxParticipants}" class="error"></span>
        </div>
        <div>
            <label for="tags">태그 (쉼표로 구분):</label>
            <input type="text" id="tags" th:field="*{tags}" placeholder="예: 자바,스프링,백엔드" />
            <span th:if="${#fields.hasErrors('tags')}" th:errors="*{tags}" class="error"></span>
        </div>
        <div>
            <button type="submit">등록</button>
            <button type="button" onclick="history.back()">취소</button>
        </div>
    </form>
</body>
</html>
