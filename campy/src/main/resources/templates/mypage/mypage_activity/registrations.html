<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내가 등록한 내역</title>
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-content">
    <div class="registrations-container">

        <h1>내가 등록한 내역</h1>

        <div class="tab-buttons">
            <button class="tab-button active" data-target="talent-section">재능</button>
            <button class="tab-button" data-target="mentoring-section">멘토링 제안</button>
            <button class="tab-button" data-target="board-section">게시물</button>
            <button class="tab-button" data-target="material-section">자료</button>
            <button class="tab-button" data-target="review-section">후기</button>
        </div>

        <div id="talent-section" class="content-section">
            <div class="section-header">
                <h2>재능</h2>
                <a th:href="@{/talents/register}" class="create-button">새 재능 등록</a>
            </div>
            <table class="content-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>제목</th>
                    <th>가격</th>
                    <th>상태</th>
                    <th>카테고리</th>
                    <th>작성일</th>
                    <th>액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="talent : ${talents}" th:id="'talent-' + ${talent.talentId}">
                    <td th:text="${talent.talentId}"></td>
                    <td th:text="${talent.title}"></td>
                    <td th:text="${talent.price}"></td>
                    <td th:text="${talent.status}"></td>
                    <td th:text="${talent.category}"></td>
                    <td th:text="${#temporals.format(talent.createdAt, 'yyyy-MM-dd')}"></td>
                    <td class="action-buttons">
                        <a th:href="@{/mypage/activity/talents/{talentId}/edit(talentId=${talent.talentId})}" class="edit-button">수정</a>
                        <form th:action="@{/mypage/activity/talents/{talentId}/delete(talentId=${talent.talentId})}" method="post" style="display:inline;">
                            <button type="submit" class="delete-button" onclick="return confirm('정말로 삭제하시겠습니까?');">삭제</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(talents)}">
                    <td colspan="7">등록된 재능이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="mentoring-section" class="content-section">
            <div class="section-header">
                <h2>멘토링 제안</h2>
                <a th:href="@{/mypage/activity/mentoringoffers/new}" class="create-button">새 멘토링 제안 등록</a>
            </div>
            <table class="content-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>제목</th>
                    <th>가격</th>
                    <th>상태</th>
                    <th>작성일</th>
                    <th>액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="offer : ${mentoringOffers}" th:id="'mentoringoffer-' + ${offer.offerId}">
                    <td th:text="${offer.offerId}"></td>
                    <td th:text="${offer.title}"></td>
                    <td th:text="${offer.price}"></td>
                    <td th:text="${offer.status}"></td>
                    <td th:text="${#temporals.format(offer.createdAt, 'yyyy-MM-dd')}"></td>
                    <td class="action-buttons">
                        <a th:href="@{/mypage/activity/mentoringoffers/{offerId}/edit(offerId=${offer.offerId})}" class="edit-button">수정</a>
                        <form th:action="@{/mypage/activity/mentoringoffers/{offerId}/delete(offerId=${offer.offerId})}" method="post" style="display:inline;">
                            <button type="submit" class="delete-button" onclick="return confirm('정말로 삭제하시겠습니까?');">삭제</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(mentoringOffers)}">
                    <td colspan="6">등록된 멘토링 제안이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="board-section" class="content-section">
            <div class="section-header">
                <h2>게시물</h2>
                <a th:href="@{/board/writeBoard}" class="create-button">새 게시물 등록</a>
            </div>
            <table class="content-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>제목</th>
                    <th>카테고리</th>
                    <th>작성일</th>
                    <th>액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="board : ${boards}">
                    <td th:text="${board.boardId}"></td>
                    <td th:text="${board.title}"></td>
                    <td th:text="${board.category}"></td>
                    <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}"></td>
                    <td class="action-buttons">
                        <a th:href="@{/mypage/activity/boards/{boardId}/edit(boardId=${board.boardId})}" class="edit-button">수정</a>
                        <form th:action="@{/mypage/activity/boards/{boardId}/delete(boardId=${board.boardId})}" method="post" style="display:inline;">
                            <button type="submit" class="delete-button" onclick="return confirm('정말로 삭제하시겠습니까?');">삭제</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(boards)}">
                    <td colspan="5">작성된 게시물이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="material-section" class="content-section">
            <div class="section-header">
                <h2>자료</h2>
                <a th:href="@{/materials/new}" class="create-button">새 자료 등록</a>
            </div>
            <table class="content-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>제목</th>
                    <th>가격</th>
                    <th>작성일</th>
                    <th>액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="material : ${materials}">
                    <td th:text="${material.materialId}"></td>
                    <td th:text="${material.title}"></td>
                    <td th:text="${material.price}"></td>
                    <td th:text="${#temporals.format(material.createdAt, 'yyyy-MM-dd')}"></td>
                    <td class="action-buttons">
                        <a th:href="@{/mypage/activity/materials/{materialId}/edit(materialId=${material.materialId})}" class="edit-button">수정</a>
                        <form th:action="@{/mypage/activity/materials/{materialId}/delete(materialId=${material.materialId})}" method="post" style="display:inline;">
                            <input type="hidden" name="_method" value="delete" />
                            <button type="submit" class="delete-button" onclick="return confirm('정말로 삭제하시겠습니까?');">삭제</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(materials)}">
                    <td colspan="5">등록된 자료가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="review-section" class="content-section">
            <div class="section-header">
                <h2>후기</h2>
                <a th:href="@{/mypage/activity/reviews/new}" class="create-button">새 후기 등록</a>
            </div>
            <table class="content-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>대상</th>
                    <th>카테고리</th>
                    <th>평점</th>
                    <th>내용</th>
                    <th>작성일</th>
                    <th>액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="review : ${reviews}">
                    <td th:text="${review.reviewId}"></td>
                    <td th:text="${review.targetUser.nickname}"></td>
                    <td th:text="${review.category}"></td>
                    <td th:text="${review.rating}"></td>
                    <td th:text="${review.content}"></td>
                    <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></td>
                    <td class="action-buttons">
                        <a th:href="@{/mypage/activity/reviews/{reviewId}/edit(reviewId=${review.reviewId})}" class="edit-button">수정</a>
                        <form th:action="@{/mypage/activity/reviews/{reviewId}/delete(reviewId=${review.reviewId})}" method="post" style="display:inline;">
                            <button type="submit" class="delete-button" onclick="return confirm('정말로 삭제하시겠습니까?');">삭제</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reviews)}">
                    <td colspan="7">작성된 후기가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</main>

<script th:inline="javascript">
    /*<![CDATA[*/
    const message = [[${message}]];
    if (message) {
        alert(message);
    }
    /*]]>*/

    document.addEventListener('DOMContentLoaded', function() {
        const tabButtons = document.querySelectorAll('.tab-button');
        const contentSections = document.querySelectorAll('.content-section');

        function showSection(sectionId) {
            contentSections.forEach(section => {
                section.style.display = 'none';
            });
            const sectionToShow = document.getElementById(sectionId);
            if(sectionToShow) {
                sectionToShow.style.display = 'block';
            }
        }

        function setActiveButton(clickedButton) {
            tabButtons.forEach(button => {
                button.classList.remove('active');
            });
            clickedButton.classList.add('active');
        }

        tabButtons.forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.dataset.target;
                showSection(targetId);
                setActiveButton(this);
            });
        });

        // 페이지 로드 시 기본적으로 첫 번째 탭 (재능) 활성화
        if (tabButtons.length > 0) {
            tabButtons[0].click();
        }
    });
</script>
</body>
</html>
