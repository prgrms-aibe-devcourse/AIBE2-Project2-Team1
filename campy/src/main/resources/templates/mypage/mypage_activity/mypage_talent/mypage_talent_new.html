<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 재능 등록</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        form { margin-top: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        div { margin-bottom: 10px; }
        label { display: inline-block; width: 100px; font-weight: bold; }
        input[type="text"], input[type="number"], textarea, select { width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        textarea { height: 100px; resize: vertical; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>새 재능 등록</h1>

    <form th:action="@{/mypage/activity/talents/new}" th:object="${talentCreateRequest}" method="post" enctype="multipart/form-data">
        <div>
            <label for="title">제목:</label>
            <input type="text" id="title" th:field="*{title}" required />
            <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></span>
        </div>
        <div>
            <label for="description">설명:</label>
            <textarea id="description" th:field="*{description}" required></textarea>
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error"></span>
        </div>
        <div>
            <label for="price">가격:</label>
            <input type="number" id="price" th:field="*{price}" required min="0" />
            <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="error"></span>
        </div>
        <div>
            <label for="availableDays">가능 요일:</label>
            <input type="text" id="availableDays" th:field="*{availableDays}" placeholder="예: 월,수,금" />
            <span th:if="${#fields.hasErrors('availableDays')}" th:errors="*{availableDays}" class="error"></span>
        </div>
        <div>
            <label for="offlineLocation">오프라인 위치:</label>
            <input type="text" id="offlineLocation" th:field="*{offlineLocation}" />
            <span th:if="${#fields.hasErrors('offlineLocation')}" th:errors="*{offlineLocation}" class="error"></span>
        </div>
        <div>
            <label for="category">카테고리:</label>
            <input type="text" id="category" th:field="*{category}" required />
            <span th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="error"></span>
        </div>
        <div>
            <label for="image">이미지:</label>
            <input type="file" id="image" name="image" accept="image/*" />
        </div>
        <div>
            <label for="tagNames">태그 (쉼표로 구분):</label>
            <input type="text" id="tagNames" th:field="*{tagNames}" placeholder="예: 프로그래밍,자바" />
            <span th:if="${#fields.hasErrors('tagNames')}" th:errors="*{tagNames}" class="error"></span>
        </div>
        <div>
            <button type="submit">등록</button>
            <button type="button" onclick="history.back()">취소</button>
        </div>
    </form>
</body>
</html>
