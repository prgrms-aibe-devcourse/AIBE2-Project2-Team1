<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::head-extra}, ~{::content}, ~{::body-extra})}">
<head>
    <title>마이페이지 - 내 후기</title>
    <th:block th:fragment="head-extra">
        <link rel="stylesheet" th:href="@{/css/mypage.css}">
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="container my-4">
            <h1>내가 등록한 후기</h1>

            <div th:if="${message}" class="alert alert-success" role="alert">
                <p th:text="${message}"></p>
            </div>

            <a th:href="@{/my-page/reviews/new}" class="btn btn-primary mb-3">새 후기 작성</a>

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>작성자</th>
                        <th>대상 사용자</th>
                        <th>평점</th>
                        <th>카테고리</th>
                        <th>내용</th>
                        <th>작성일</th>
                        <th>수정일</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="review : ${reviews}">
                        <td th:text="${review.reviewId}"></td>
                        <td th:text="${review.author.nickname}"></td>
                        <td th:text="${review.targetUser.nickname}"></td>
                        <td th:text="${review.rating}"></td>
                        <td th:text="${review.category}"></td>
                        <td th:text="${review.content}"></td>
                        <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${#temporals.format(review.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <a th:href="@{/my-page/reviews/{id}/edit(id=${review.reviewId})}" class="btn btn-sm btn-info">수정</a>
                            <form th:action="@{/my-page/reviews/{id}/delete(id=${review.reviewId})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('정말로 삭제하시겠습니까?');">삭제</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reviews)}">
                        <td colspan="9" class="text-center">작성한 후기가 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </th:block>
    <th:block th:fragment="body-extra">
        <!-- 이 페이지에만 필요한 추가 JS -->
    </th:block>
</body>
</html>
