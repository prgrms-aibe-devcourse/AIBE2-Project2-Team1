<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::head-extra}, ~{::content}, ~{::body-extra})}">
<head>
    <title>마이페이지 - 후기 수정</title>
    <th:block th:fragment="head-extra">
        <link rel="stylesheet" th:href="@{/css/mypage.css}">
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="container my-4">
            <h1>후기 수정</h1>

            <form th:action="@{/my-page/reviews/{reviewId}/update(reviewId=${review.reviewId})}" th:object="${reviewUpdateRequest}" method="post">
                <div th:if="${#fields.hasErrors()}" class="alert alert-danger" role="alert">
                    <p th:each="err : ${#fields.errors()}" th:text="${err}"></p>
                </div>

                <div class="mb-3">
                    <label for="rating" class="form-label">평점 (1-5)</label>
                    <input type="number" class="form-control" id="rating" th:field="*{rating}" min="1" max="5">
                    <div th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}" class="text-danger"></div>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label">카테고리</label>
                    <input type="text" class="form-control" id="category" th:field="*{category}">
                    <div th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-danger"></div>
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label">내용</label>
                    <textarea class="form-control" id="content" th:field="*{content}"></textarea>
                    <div th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="text-danger"></div>
                </div>

                <button type="submit" class="btn btn-primary">후기 수정</button>
                <a th:href="@{/my-page/reviews/my-reviews}" class="btn btn-secondary">취소</a>
            </form>
        </div>
    </th:block>
    <th:block th:fragment="body-extra">
        <!-- 이 페이지에만 필요한 추가 JS -->
    </th:block>
</body>
</html>
