<!-- src/main/resources/templates/login.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>캠퍼스재능톡 - 로그인</title>
    <link rel="stylesheet" href="/css/style.css"> <!-- 필요 시 CSS 연결 -->
</head>
<body>
<div class="container">
    <h2>로그인</h2>

    <form th:action="@{/api/auth/login}" method="post" id="loginForm">
        <div>
            <label for="email">이메일</label><br>
            <input type="email" id="email" name="email" placeholder="example@school.ac.kr" required>
        </div>
        <div>
            <label for="password">비밀번호</label><br>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">로그인</button>
    </form>

    <div id="error-message" style="color: red;"></div>
</div>

<script>
    // AJAX 로그인 요청 처리
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        const formData = new FormData(loginForm);
        const data = {
            email: formData.get("email"),
            password: formData.get("password")
        };

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (!res.ok) {
                const errorText = await res.text();
                document.getElementById('error-message').innerText = errorText;
                return;
            }

            const token = await res.text();
            localStorage.setItem("token", token);
            alert("로그인 성공!");
            window.location.href = "/"; // 로그인 후 이동할 페이지

        } catch (err) {
            document.getElementById('error-message').innerText = '서버 오류 발생';
        }
    });
</script>
</body>
</html>
