<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>캠퍼스재능톡 - 회원가입</title>
    <link rel="stylesheet" href="/css/style.css"> <!-- 필요 시 CSS 연결 -->
</head>
<body>
<div class="container">
    <h2>회원가입</h2>

    <form th:action="@{/api/auth/signup}" method="post" id="signupForm">
        <div>
            <label for="email">이메일</label><br>
            <input type="email" id="email" name="email" placeholder="example@school.ac.kr" required>
        </div>
        <div>
            <label for="password">비밀번호</label><br>
            <input type="password" id="password" name="password" required>
        </div>
        <div>
            <label for="name">이름</label><br>
            <input type="text" id="name" name="name" required>
        </div>
        <div>
            <label for="nickname">닉네임</label><br>
            <input type="text" id="nickname" name="nickname" required>
        </div>

        <button type="submit">가입하기</button>
    </form>

    <div id="error-message" style="color: red;"></div>
</div>

<script>
    const signupForm = document.getElementById('signupForm');
    signupForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        const formData = new FormData(signupForm);
        const data = {
            email: formData.get("email"),
            password: formData.get("password"),
            name: formData.get("name"),
            nickname: formData.get("nickname")
        };

        try {
            const res = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (!res.ok) {
                const errorText = await res.text();
                document.getElementById('error-message').innerText = errorText;
                return;
            }

            alert("회원가입 성공!");
            window.location.href = "/login"; // 회원가입 후 로그인 페이지로 이동

        } catch (err) {
            document.getElementById('error-message').innerText = '서버 오류 발생';
        }
    });
</script>
</body>
</html>
