<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>리뷰 게시판</title>
    <link rel="stylesheet" th:href="@{/css/review.css}">
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            position: relative;
        }

        .write-table {
            width: 100%;
        }

        .write-table th {
            text-align: left;
            width: 100px;
            padding-bottom: 10px;
        }

        .write-table td {
            padding-bottom: 10px;
        }

        .write-table select, .write-table input, .write-table textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .write-table textarea {
            height: 100px;
            resize: none;
        }

        .stars .star {
            cursor: pointer;
            font-size: 24px;
            margin-right: 5px;
        }

        .btn-wrapper {
            text-align: right;
        }

        .submit-button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
        }

        .submit-button:hover {
            background-color: #0b7dda;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- ✅ Header Fragment -->
<header th:replace="~{fragments/header :: header}"></header>

<h2>리뷰 게시판</h2>

<div class="search-bar">
    <form th:action="@{/reviews}" method="get">
        <select name="type">
            <option value="reviewer" th:selected="${param.type == 'reviewer'}">닉네임</option>
            <option value="category" th:selected="${param.type == 'category'}">카테고리</option>
            <option value="content" th:selected="${param.type == 'content'}">내용</option>
        </select>
        <input type="text" name="keyword" placeholder="검색어를 입력하세요." th:value="${param.keyword}">
        <button type="submit">검색</button>
        <button type="button" id="openReviewModal" class="write-button">작성하기</button>
    </form>
</div>

<table class="board-table">
    <thead>
    <tr>
        <th>NO</th>
        <th>CATEGORY</th>
        <th>NAME</th>
        <th>STARS</th>
        <th>CONTENT</th>
        <th>REVIEWER</th>
        <th>DATE</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="review, iStat : ${reviews}">
        <td th:text="${iStat.count}">0</td>
        <td th:text="${review.category}">카테고리</td>
        <td th:text="${review.targetUser.nickname}">사용자</td>
        <td th:text="${review.rating}">⭐⭐⭐⭐⭐</td>
        <td class="left-align" th:text="${review.content}">내용</td>
        <td th:text="${review.author.nickname}">작성자</td>
        <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}">9999-12-31</td>
    </tr>
    </tbody>
</table>

<!-- 리뷰 작성 모달 -->
<div id="reviewModal" class="modal-overlay">
    <div class="modal-content review-popup">
        <button id="closeReviewModal" class="modal-close">×</button>
        <h3>리뷰 작성하기</h3>
        <form th:action="@{/reviews}" th:object="${reviewCreateRequest}" method="post">
            <table class="write-table">
                <tr>
                    <th>리뷰 분야</th>
                    <td>
                        <select th:field="*{category}" required>
                            <option value="" disabled selected>리뷰 분야를 선택해주세요.</option>
                            <option value="멘토링">멘토링</option>
                            <option value="자료">자료</option>
                            <option value="재능">재능</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th>리뷰 대상</th>
                    <td>
                        <input type="text" th:field="*{nickname}" placeholder="대상 사용자 닉네임을 입력하세요." required>
                    </td>
                </tr>
                <tr>
                    <th>별점</th>
                    <td class="stars">
                        <span class="star" data-value="1">☆</span>
                        <span class="star" data-value="2">☆</span>
                        <span class="star" data-value="3">☆</span>
                        <span class="star" data-value="4">☆</span>
                        <span class="star" data-value="5">☆</span>
                        <input type="hidden" th:field="*{rating}" name="rating" />
                    </td>
                </tr>
                <tr>
                    <th>내용</th>
                    <td>
                        <textarea th:field="*{content}" placeholder="최대 500자 이내로 작성해주세요." maxlength="500" required></textarea>
                    </td>
                </tr>
            </table>
            <div class="btn-wrapper">
                <button type="submit" class="submit-button">작성하기</button>
            </div>
        </form>
    </div>
</div>

<!-- ✅ Footer Fragment -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const openBtn = document.getElementById('openReviewModal');
        const closeBtn = document.getElementById('closeReviewModal');
        const modal = document.getElementById('reviewModal');
        const stars = document.querySelectorAll('.star');
        const hiddenInput = document.querySelector('input[name=\"rating\"]');

        let selectedRating = 0;

        openBtn?.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        closeBtn?.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        stars.forEach((star) => {
            star.addEventListener('click', () => {
                selectedRating = star.getAttribute('data-value');
                hiddenInput.value = selectedRating;
                updateStars(selectedRating);
            });
        });

        function updateStars(rating) {
            stars.forEach((star) => {
                const value = star.getAttribute('data-value');
                star.textContent = (value <= rating) ? '⭐' : '☆';
            });
        }

        updateStars(0);
    });
</script>

</body>
</html>
