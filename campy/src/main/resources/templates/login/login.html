<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Campy</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    
</head>
<body>
<!-- 로고 섹션 -->
<div class="logo-section">
    <a href="/" class="logo" th:href="@{/}">
        <img src="/images/logo.png" alt="Campy Logo" class="logo-image">
    </a>
</div>

<!-- 로그인 폼 -->
<div class="login-container">
    <!-- 에러 메시지 표시 -->
    <div th:if="${error}" class="error-message" th:text="${error}">
        로그인에 실패했습니다. 아이디와 비밀번호를 확인해주세요.
    </div>

    <!-- 성공 메시지 표시 (회원가입 후 등) -->
    <div th:if="${message}" class="success-message" th:text="${message}">
        회원가입이 완료되었습니다. 로그인해주세요.
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username" class="form-label">아이디</label>
            <input type="text"
                   id="username"
                   name="username"
                   class="form-input"
                   placeholder="아이디를 입력하세요"
                   th:value="${username}"
                   required>
        </div>

        <div class="form-group">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password"
                   id="password"
                   name="password"
                   class="form-input"
                   placeholder="비밀번호를 입력하세요"
                   required>
        </div>

        <button type="submit" class="login-btn">로그인</button>

        <div class="login-options">
            <label class="remember-me">
                <input type="checkbox" name="remember-me">
                로그인 유지
            </label>
            <a href="/find-account" class="find-account" th:href="@{/find-account}">
                아이디 / 비밀번호 찾기
            </a>
        </div>
    </form>

    <div class="signup-link">
        아직 회원이 아니신가요?
        <a href="/signup" th:href="@{/signup}">회원가입</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // 기본 폼 제출 방지

        const container = document.querySelector('.login-container');
        const submitBtn = document.querySelector('.login-btn');
        const errorMessageDiv = document.querySelector('.error-message');
        const successMessageDiv = document.querySelector('.success-message');

        // 메시지 초기화
        if (errorMessageDiv) errorMessageDiv.style.display = 'none';
        if (successMessageDiv) successMessageDiv.style.display = 'none';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            if (errorMessageDiv) {
                errorMessageDiv.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
                errorMessageDiv.style.display = 'block';
            }
            return;
        }

        // 로딩 상태 적용
        container.classList.add('loading');
        submitBtn.textContent = '로그인 중...';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                // 로그인 성공
                // 토큰은 HttpOnly 쿠키로 설정되므로 클라이언트에서 직접 접근할 필요 없음
                console.log('로그인 성공');
                window.location.href = '/'; // 메인 페이지로 리다이렉트
            } else {
                // 로그인 실패
                const errorText = await response.text();
                if (errorMessageDiv) {
                    errorMessageDiv.textContent = errorText || '로그인에 실패했습니다. 이메일과 비밀번호를 확인해주세요.';
                    errorMessageDiv.style.display = 'block';
                }
            }
        } catch (error) {
            console.error('네트워크 오류:', error);
            if (errorMessageDiv) {
                errorMessageDiv.textContent = '네트워크 오류가 발생했습니다. 다시 시도해주세요.';
                errorMessageDiv.style.display = 'block';
            }
        } finally {
            // 로딩 상태 해제
            container.classList.remove('loading');
            submitBtn.textContent = '로그인';
        }
    });

    // 입력 필드 포커스 시 에러 메시지 숨기기
    const inputs = document.querySelectorAll('.form-input');
    const errorMessage = document.querySelector('.error-message');

    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            if (errorMessage) {
                errorMessage.style.display = 'none';
            }
        });
    });

    // Enter 키로 폼 제출 (이미 submit 이벤트 리스너가 처리하므로 이 부분은 필요 없을 수 있음)
    // document.addEventListener('keypress', function(e) {
    //     if (e.key === 'Enter') {
    //         const form = document.getElementById('loginForm');
    //         form.dispatchEvent(new Event('submit', { cancelable: true }));
    //     }
    // });
</script>
</body>
</html>
