<!-- templates/fragments/header.html -->
<div th:fragment="header">
    <style>
        .auth-button {
            background-color: #146C94;
            color: white;
            border: 1px solid white;
            border-radius: 10px;
            padding: 6px 12px;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        .auth-button:hover {
            background-color: #094B69;
        }

        .custom-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background-color: #AFD3E2;
            border-bottom: 8px solid #19A7CE;
            border-radius: 0 0 20px 20px;
            position: relative;
            z-index: 1;
        }

        .nav-links {
            display: flex;
            justify-content: flex-start;
            flex: 1;
            gap: 24px;
            margin-left: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: #515151; /* ✔ 기본 글자색 */
            font-weight: bold; /* ✔ 굵게 */
            font-size: 18px; /* ✔ 크기 */
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #146C94; /* ✔ hover 시 색상 */
        }

        .logo-section {
            position: relative;
            z-index: 10;
        }

        .logo-image {
            height: 50px;
        }
    </style>

    <header class="custom-header">
        <div class="logo-section">
            <a th:href="@{/}">
                <img src="/images/logo.png" alt="Campy Logo" class="logo-image">
            </a>
        </div>

        <!-- 중앙: 카테고리 (왼쪽 정렬) -->
        <nav class="nav-links">
            <a th:href="@{/about}">소개</a>
            <a href="#" onclick="requireLogin('멘토 페이지는 로그인 후 이용 가능합니다')">멘토</a>
            <a href="#" onclick="requireLogin('재능 페이지는 로그인 후 이용 가능합니다')">재능</a>
            <a href="#" onclick="requireLogin('게시판은 로그인 후 이용 가능합니다')">게시판</a>
            <a href="#" onclick="requireLogin('자료 페이지는 로그인 후 이용 가능합니다')">자료</a>
            <a href="#" onclick="requireLogin('리뷰는 로그인 후 이용 가능합니다')">리뷰</a>
        </nav>

        <!-- 우측: 로그인/회원가입 or 마이페이지 -->
        <div style="display: flex; gap: 12px;">
            <span th:if="${loggedInUser}">
                <a th:href="@{/mypage}" class="auth-button">마이페이지</a>
                <a th:href="@{/message}" class="auth-button">쪽지하기</a>
                <a th:href="@{/logout}" class="auth-button">로그아웃</a>
            </span>
            <span th:unless="${loggedInUser}">
                <a th:href="@{/login}" class="auth-button">로그인</a>
                <a th:href="@{/signup}" class="auth-button">가입하기</a>
            </span>
        </div>
    </header>

    <script th:inline="javascript">
        function requireLogin(message) {
            alert(message);
            window.location.href = /*[[@{/login}]]*/ '/login';
        }
    </script>
</div>
