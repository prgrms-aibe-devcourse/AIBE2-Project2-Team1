<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/fragments/admin_layout :: layout(~{::title}, ~{::head-extra}, ~{::content}, ~{::body-extra})}">
<head>
    <title>관리자 페이지 - Campy</title>
    <th:block th:fragment="head-extra">
        <!-- 이 페이지에만 필요한 추가 CSS/JS -->
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="admin-page-container">
            <h1>관리자페이지</h1>

            <!-- 프로필 섹션 -->
            <section class="profile-section" th:if="${admin}">
                <img th:src="${admin.profileImageUrl}" src="https://placehold.co/60x60/19A7CE/F6F1F1?text=A" alt="관리자 프로필 이미지" class="profile-image" onerror="this.onerror=null; this.src='https://placehold.co/60x60/cccccc/ffffff?text=Admin';">
                <div class="profile-info">
                    <p class="username" th:text="|관리자/${admin.username}|">관리자/admin</p>
                    <p class="details" th:text="${admin.level}">LEVEL</p>
                </div>
            </section>

            <hr class="separator">

        </div>
    </th:block>
    <th:block th:fragment="body-extra">
        <!-- 이 페이지에만 필요한 추가 JS -->
    </th:block>
</body>
</html>
