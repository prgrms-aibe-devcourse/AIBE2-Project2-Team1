<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/fragments/admin_layout :: layout(~{::title}, ~{::head-extra}, ~{::content}, ~{::body-extra})}">
<head>
    <title>관리자 - 리뷰 관리</title>
    <th:block th:fragment="head-extra">
        <!-- 이 페이지에만 필요한 추가 CSS/JS -->
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="container">
            <h1>리뷰 관리</h1>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>작성자</th>
                        <th>대상 사용자</th>
                        <th>평점</th>
                        <th>카테고리</th>
                        <th>내용</th>
                        <th>작성일</th>
                        <th>수정일</th>
                        <th>대상 ID</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="review : ${reviews}">
                        <td th:text="${review.reviewId}"></td>
                        <td th:text="${review.author.nickname}"></td>
                        <td th:text="${review.targetUser.nickname}"></td>
                        <td th:text="${review.rating}"></td>
                        <td th:text="${review.category}"></td>
                        <td th:text="${review.content}"></td>
                        <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${#temporals.format(review.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${review.targetId}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </th:block>
    <th:block th:fragment="body-extra">
        <!-- 이 페이지에만 필요한 추가 JS -->
    </th:block>
</body>
</html>
