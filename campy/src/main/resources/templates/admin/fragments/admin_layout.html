<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="layout (title, headExtra, content, bodyExtra)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">관리자 페이지</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <!-- 추가적인 CSS나 JS 링크는 여기에 삽입될 수 있습니다. -->
    <th:block th:replace="${headExtra}"></th:block>
</head>
<body>
    <div class="admin-wrapper">
        <header class="admin-header">
            <h1 class="admin-logo"><a th:href="@{/admin}">Campy Admin</a></h1>
            <nav class="admin-top-nav">
                <ul>
                    <li><a th:href="@{/logout}">로그아웃</a></li>
                </ul>
            </nav>
        </header>

        <aside class="admin-sidebar">
            <nav>
                <ul>
                    <li><a th:href="@{/admin/users}">회원 관리</a></li>
                    <li><a th:href="@{/admin/boards}">게시글 관리</a></li>
                    <li><a th:href="@{/admin/talents}">재능 관리</a></li>
                    <li><a th:href="@{/admin/mentoring-offers}">멘토링 제안 관리</a></li>
                    <li><a th:href="@{/admin/mentoring-matches}">멘토링 매칭 관리</a></li>
                    <li><a th:href="@{/admin/reviews}">리뷰 관리</a></li>
                    <li><a th:href="@{/admin/payments}">거래 내역</a></li>
                    <li><a th:href="@{/admin/ai-usage}">AI 사용 통계</a></li>
                    <!-- 기타 관리자 메뉴 -->
                </ul>
            </nav>
        </aside>

        <main class="admin-main-content">
            <th:block th:replace="${content}"></th:block>
        </main>

        <footer class="admin-footer">
            <p>&copy; 2025 Campy Admin. All rights reserved.</p>
        </footer>
    </div>

    <!-- 추가적인 JS 스크립트는 여기에 삽입될 수 있습니다. -->
    <th:block th:replace="${bodyExtra}"></th:block>
</body>
</html>
