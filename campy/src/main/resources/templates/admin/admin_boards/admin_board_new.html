<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/fragments/admin_layout :: layout(~{::title}, ~{::head-extra}, ~{::content}, ~{::body-extra})}">
<head>
    <title>관리자 - 게시물 생성</title>
    <th:block th:fragment="head-extra">
        <!-- 이 페이지에만 필요한 추가 CSS/JS -->
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="container">
            <h1>게시물 생성</h1>

            <form th:action="@{/admin/boards/new}" th:object="${boardCreateRequest}" method="post">
                <div th:if="${#fields.hasErrors()}" class="alert alert-danger" role="alert">
                    <p th:each="err : ${#fields.errors()}" th:text="${err}"></p>
                </div>

                <div class="mb-3">
                    <label for="userId" class="form-label">작성자 (User ID)</label>
                    <select class="form-control" id="userId" th:field="*{userId}">
                        <option value="">-- 작성자 선택 --</option>
                        <option th:each="user : ${users}" th:value="${user.userId}" th:text="${user.nickname + ' (' + user.email + ')'}"></option>
                    </select>
                    <div th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="text-danger"></div>
                </div>

                <div class="mb-3">
                    <label for="school" class="form-label">학교</label>
                    <input type="text" class="form-control" id="school" th:field="*{school}">
                    <div th:if="${#fields.hasErrors('school')}" th:errors="*{school}" class="text-danger"></div>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label">카테고리</label>
                    <input type="text" class="form-control" id="category" th:field="*{category}">
                    <div th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-danger"></div>
                </div>

                <div class="mb-3">
                    <label for="title" class="form-label">제목</label>
                    <input type="text" class="form-control" id="title" th:field="*{title}">
                    <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger"></div>
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label">내용</label>
                    <textarea class="form-control" id="content" rows="5" th:field="*{content}"></textarea>
                    <div th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="text-danger"></div>
                </div>

                <button type="submit" class="btn btn-primary">게시물 생성</button>
                <a th:href="@{/admin/boards}" class="btn btn-secondary">취소</a>
            </form>
        </div>
    </th:block>
    <th:block th:fragment="body-extra">
        <!-- 이 페이지에만 필요한 추가 JS -->
    </th:block>
</body>
</html>
