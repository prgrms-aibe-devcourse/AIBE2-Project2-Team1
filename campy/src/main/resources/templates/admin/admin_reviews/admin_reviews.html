<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/fragments/admin_layout :: layout(~{::title}, ~{::head-extra}, ~{::content}, ~{::body-extra})}">
<head>
    <title>관리자 - 리뷰 관리</title>
    <th:block th:fragment="head-extra">
        <!-- 이 페이지에만 필요한 추가 CSS/JS -->
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="container">
            <h1>리뷰 관리</h1>
            <div class="search-form" style="margin-bottom: 20px;">
                <form th:action="@{/admin/reviews}" method="get">
                    <select name="searchType">
                        <option value="content" th:selected="${searchType == 'content'}">내용</option>
                        <option value="category" th:selected="${searchType == 'category'}">카테고리</option>
                        <option value="authorNickname" th:selected="${searchType == 'authorNickname'}">작성자 닉네임</option>
                        <option value="targetUserNickname" th:selected="${searchType == 'targetUserNickname'}">대상 사용자 닉네임</option>
                    </select>
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어를 입력하세요">
                    <button type="submit" class="button">검색</button>
                </form>
            </div>
            <div class="button-group" style="margin-bottom: 20px;">
                <a th:href="@{/admin/reviews/new}" class="button">새 리뷰 추가</a>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>작성자</th>
                        <th>대상 사용자</th>
                        <th>평점</th>
                        <th>카테고리</th>
                        <th>내용</th>
                        <th>작성일</th>
                        <th>수정일</th>
                        <th>대상 ID</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="review : ${reviews}">
                        <td th:text="${review.reviewId}"></td>
                        <td th:text="${review.author.nickname}"></td>
                        <td th:text="${review.targetUser.nickname}"></td>
                        <td th:text="${review.rating}"></td>
                        <td th:text="${review.category}"></td>
                        <td th:text="${review.content}"></td>
                        <td th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${#temporals.format(review.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${review.targetId}"></td>
                        <td>
                            <a th:href="@{/admin/reviews/{reviewId}/edit(reviewId=${review.reviewId})}" class="button">수정</a>
                            <form th:action="@{/admin/reviews/{reviewId}(reviewId=${review.reviewId})}" method="post" style="display:inline;" onsubmit="return confirm('정말로 이 리뷰를 삭제하시겠습니까?');">
                                <input type="hidden" name="_method" value="delete" />
                                <button type="submit" class="button delete-button">삭제</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </th:block>
    <th:block th:fragment="body-extra">
        <!-- 이 페이지에만 필요한 추가 JS -->
    </th:block>
</body>
</html>
