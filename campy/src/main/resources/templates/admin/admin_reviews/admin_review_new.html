<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/fragments/admin_layout :: layout(~{::title}, ~{::head-extra}, ~{::content}, ~{::body-extra})}">
<head>
    <title>관리자 - 새 리뷰 추가</title>
    <th:block th:fragment="head-extra">
        <!-- 이 페이지에만 필요한 추가 CSS/JS -->
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="container">
            <h1>새 리뷰 추가</h1>
            <form th:action="@{/admin/reviews}" method="post">
                <div class="form-group">
                    <label for="authorId">작성자 ID:</label>
                    <input type="number" id="authorId" name="authorId" required>
                </div>
                <div class="form-group">
                    <label for="targetUserId">대상 사용자 ID:</label>
                    <input type="number" id="targetUserId" name="targetUserId" required>
                </div>
                <div class="form-group">
                    <label for="targetId">대상 ID (멘토링 매칭 ID 등):</label>
                    <input type="number" id="targetId" name="targetId">
                </div>
                <div class="form-group">
                    <label for="rating">평점 (1-5):</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" required>
                </div>
                <div class="form-group">
                    <label for="category">카테고리:</label>
                    <input type="text" id="category" name="category" required>
                </div>
                <div class="form-group">
                    <label for="content">내용:</label>
                    <textarea id="content" name="content" rows="5" required></textarea>
                </div>
                <button type="submit" class="button">리뷰 추가</button>
                <a th:href="@{/admin/reviews}" class="button cancel-button">취소</a>
            </form>
        </div>
    </th:block>
    <th:block th:fragment="body-extra">
        <!-- 이 페이지에만 필요한 추가 JS -->
    </th:block>
</body>
</html>
