<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 쪽지함 - 캠피</title>
  <link rel="stylesheet" th:href="@{/css/msg.css}" />
</head>
<body>
<!-- [헤더 fragment 포함] -->
<div th:replace="~{fragments/header :: header}"></div>

<main class="container">
  <h2>내 쪽지함</h2>

  <div class="search-box">
    <select id="message-box-type">
      <option value="inbox">받은 쪽지함</option>
      <option value="sent">보낸 쪽지함</option>
    </select>
    <button class="send-btn" onclick="openMessageForm()">📨 보내기</button>
  </div>

  <table>
    <colgroup>
      <col style="width: 3%">
      <col style="width: 10%">
      <col style="width: 8%">
      <col style="width: 51%">
      <col style="width: 10%">
    </colgroup>
    <thead>
    <tr>
      <th>NO</th>
      <th>구분</th>
      <th>NAME</th>
      <th>CONTENT</th>
      <th>DATE</th>
    </tr>
    </thead>
    <tbody id="message-table-body">
    <!-- 메시지 데이터가 여기에 들어갑니다 -->
    </tbody>
  </table>
</main>

<!-- [푸터 fragment 포함] -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
  // 전역 변수
  let currentBoxType = "inbox";

  // select box 이벤트 바인딩
  document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("message-box-type").onchange = function() {
      currentBoxType = this.value;
      renderMessages();
    };
    renderMessages();
  });

  // 받은 쪽지 fetch
  async function fetchMessagesInbox() {
    const res = await fetch('/api/messages/inbox', {
      credentials: 'include' // 쿠키 자동 전송
    });
    if (res.status === 401) {
      alert("로그인이 필요합니다!");
      location.href = "/login";
      return [];
    }
    if (!res.ok) throw new Error("받은 쪽지함 데이터를 불러올 수 없습니다.");
    return await res.json();
  }

  // 보낸 쪽지 fetch
  async function fetchMessagesSent() {
    const res = await fetch('/api/messages/sent', {
      credentials: 'include' // 쿠키 자동 전송
    });
    if (res.status === 401) {
      alert("로그인이 필요합니다!");
      location.href = "/login";
      return [];
    }
    if (!res.ok) throw new Error("보낸 쪽지함 데이터를 불러올 수 없습니다.");
    return await res.json();
  }

  // 테이블 렌더링
  async function renderMessages() {
    try {
      let messages = [];
      if (currentBoxType === "inbox") {
        messages = await fetchMessagesInbox();
      } else {
        messages = await fetchMessagesSent();
      }

      const tableBody = document.getElementById("message-table-body");
      tableBody.innerHTML = "";

      if (messages.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">쪽지가 없습니다.</td></tr>`;
      } else {
        messages.forEach((msg, idx) => {
          const row = document.createElement("tr");
          row.innerHTML = `
                <td>${idx + 1}</td>
                <td>${currentBoxType === "inbox" ? "받은쪽지" : "보낸쪽지"}</td>
                <td>${msg.nickname}</td>
                <td>${msg.content}</td>
                <td>${msg.sentAt ? msg.sentAt.replace("T", " ").slice(0, 16) : ""}</td>
              `;
          tableBody.appendChild(row);
        });
      }
    } catch (e) {
      alert(e.message);
    }
  }

  // 쪽지 보내기 팝업
  function openMessageForm() {
    const width = 500;
    const height = 400;
    const left = (window.screen.width / 2) - (width / 2);
    const top = (window.screen.height / 2) - (height / 2);

    window.open(
            '/msg/sendMsg.html',
            '쪽지 보내기',
            `width=${width},height=${height},top=${top},left=${left},resizable=no`
    );
  }
</script>
</body>
</html>
