<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>쪽지 보내기</title>
    <link rel="stylesheet" href="/css/msg.css" />
</head>
<body>
<div class="message-form-container">
    <form id="msgForm">
        <table class="message-form-table">
            <tr>
                <th><label for="toInput">받는 사람</label></th>
                <td>
                    <input type="text" id="toInput" placeholder="받는 아이디" required autocomplete="off" />
                </td>
            </tr>
            <tr>
                <th><label for="contentInput">내용</label></th>
                <td>
                    <textarea id="contentInput" maxlength="500" placeholder="내용을 입력하세요. (최대 500자)" required></textarea>
                </td>
            </tr>
        </table>
        <div class="send-btn-wrapper">
            <button type="submit" class="send-msg-button">보내기</button>
        </div>
        <div id="sendMsgResult" style="margin-top:18px;color:#146C94;font-weight:500"></div>
    </form>
</div>

<script>
    // 쿼리 파라미터로 받는 사람 자동 세팅
    const params = new URLSearchParams(location.search);
    const toValue = params.get('to');
    if (toValue) {
        document.getElementById('toInput').value = toValue;
    }

    // 폼 제출(fetch, 쿠키 자동 인증)
    document.getElementById('msgForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const to = document.getElementById('toInput').value.trim();
        const content = document.getElementById('contentInput').value.trim();
        const resultDiv = document.getElementById('sendMsgResult');

        if (!to || !content) {
            resultDiv.textContent = "받는 사람과 내용을 모두 입력하세요.";
            return;
        }

        try {
            const res = await fetch('/api/messages', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to, content })
            });

            if (res.ok) {
                resultDiv.textContent = "쪽지 전송 성공!";
                setTimeout(() => window.close(), 1200);
            } else if (res.status === 401) {
                alert("로그인이 필요합니다.");
                window.location.href = "/login";
            } else {
                const text = await res.text();
                resultDiv.textContent = text || "쪽지 전송 실패";
            }
        } catch (err) {
            resultDiv.textContent = "네트워크 오류";
        }
    });
</script>
</body>
</html>
