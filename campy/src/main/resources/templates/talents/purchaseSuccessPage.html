<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: 100px auto;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .success-icon {
            font-size: 50px;
            color: #00AACC;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .message {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
        }

        .download-button {
            display: inline-block;
            background-color: #00AACC;
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .download-button:hover {
            background-color: #007799;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #999;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="success-icon">✅</div>
    <h2 th:text="${message}">결제 완료 메시지</h2>
    <div class="message">구매하신 재능는 마이페이지를 통해서 확인하실 수 있습니다.</div>

    <a href="/materials" class="back-link">← 자료 목록으로 돌아가기</a>
</div>
</body>
</html>
