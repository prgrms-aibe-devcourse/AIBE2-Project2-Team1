<!-- src/main/resources/templates/talents/list.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재능 검색 | campy</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/talent.css}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #F6F1F1 !important;
        }
        body {
            min-height: 100vh;
        }
        .talent-container {
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #F6F1F1;
            min-height: 100vh;
            width: 100vw;
        }
        .search-section {
            width: 100vw;
            display: flex;
            justify-content: center;
            background: #F6F1F1;
        }
        .search-container {
            width: 900px;
        }
        .search-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 18px;
            margin-top: 0;
            text-align: left;
        }
        .search-box {
            display: flex;
            align-items: center;
            position: relative;
            border: 2px solid #19A7CE;
            border-radius: 25px;
            background: #fff;
            width: 100%;
            height: 56px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        .search-box input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            flex: 1;
            height: 100%;
            padding: 0 56px 0 18px;
            border-radius: 25px;
        }
        .search-box button {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            background: #19A7CE;
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            font-size: 20px;
            box-shadow: 0 1px 2px rgba(25,167,206,0.07);
        }
        .search-box button:hover {
            background: #108fcb;
        }
        .popular-keywords {
            margin-top: 12px;
            font-size: 14px;
            color: #888;
            margin-left: 8px;
        }
        .popular-keywords span {
            color: #aaa;
        }
        .popular-keywords a {
            color: #888;
            text-decoration: none;
            margin-left: 8px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .popular-keywords a:hover {
            color: #19A7CE;
            text-decoration: underline;
        }
        .results-section {
            width: 900px;
            margin-bottom: 30px;
            background: transparent;
        }
        .talent-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px 20px;
            margin-top: 14px;
        }
        .talent-card {
            background-color: #fff;
            border: 2px solid #19A7CE;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: box-shadow 0.2s;
        }
        .talent-card:hover {
            box-shadow: 0 6px 20px rgba(25,167,206,0.15);
        }
        .talent-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .talent-info {
            padding: 12px;
        }
        .talent-title {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 15px;
            line-height: 1.2;
        }
        .talent-price, .talent-category {
            color: #666;
            font-size: 14px;
        }
        .register-button {
            width: 900px;
            padding: 12px;
            background-color: #ccc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
            margin-top: 32px;
        }
        .register-button:hover {
            background-color: #bbb;
        }
        @media (max-width: 1100px) {
            .results-section, .search-container, .register-button {
                width: 98vw;
                min-width: 320px;
                max-width: 900px;
            }
            .talent-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 700px) {
            .results-section, .search-container, .register-button {
                width: 100vw;
                min-width: 0;
            }
            .talent-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<div class="talent-container">
    <div class="search-section">
        <div class="search-container">
            <div class="search-title">어떤 분야의 재능을 원하시나요?</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="검색어를 입력해주세요">
                <button onclick="handleSearch()">➜</button>
            </div>
            <div class="popular-keywords">
                <span>인기 검색어:</span>
                <a onclick="setKeyword('ppt')">ppt</a>
                <a onclick="setKeyword('컴퓨터 구조')">컴퓨터 구조</a>
                <a onclick="setKeyword('리눅스')">리눅스</a>
                <a onclick="setKeyword('과제')">과제</a>
                <a onclick="setKeyword('족보')">족보</a>
                <a onclick="setKeyword('스터디')">스터디</a>
                <a onclick="setKeyword('정리')">정리</a>
                <a onclick="setKeyword('요약')">요약</a>
                <a onclick="setKeyword('pdf')">pdf</a>
                <a onclick="setKeyword('발표')">발표</a>
            </div>
        </div>
    </div>
    <div class="results-section">
        <h3 id="resultTitle">최근 올라온 재능</h3>
        <div class="talent-list" id="talentList">
            <!-- Thymeleaf로 DB에서 가져온 카드 -->
            <a th:each="talent : ${talents}" th:href="@{/talents/{id}(id=${talent.talentId})}" style="text-decoration:none; color:inherit;">
                <div class="talent-card">
                    <img th:if="${talent.imagePath != null and !#strings.isEmpty(talent.imagePath)}"
                         th:src="@{|/images/${talent.imagePath}|}" alt="썸네일">
                    <img th:if="${talent.imagePath == null or #strings.isEmpty(talent.imagePath)}"
                         src="/images/sample-ppt.png" alt="썸네일">
                    <div class="talent-info">
                        <p class="talent-title" th:text="${talent.title}"></p>
                        <p class="talent-price" th:text="${#numbers.formatInteger(talent.price, 3, 'COMMA')} + '원'"></p>
                        <p class="talent-category" th:text="${talent.category}"></p>
                    </div>
                </div>
            </a>
            <!-- JS 더미카드(아래 script로 동적 추가) -->
        </div>
    </div>
    <button class="register-button" onclick="location.href='/talents/register'">재능 등록하기</button>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script>
    // JS 더미데이터
    const sampleData = [
        {title: '눈에 잘 띄는 ppt템플릿 팝니다.', category: '대행소', price: '10,000원', image: '/images/sample-ppt.png'},
        {title: '코딩 과제 도와드립니다.', category: '멘토/코딩', price: '20,000원', image: '/images/sample-code.png'},
        {title: '고퀄리티 디자인 서비스', category: '디자인', price: '15,000원', image: '/images/sample-design.png'},
        {title: '리눅스', category: '멘토/코딩', price: '10,000원', image: '/images/sample-ppt.png'},
        {title: 'pdf.', category: '멘토/코딩', price: '10,000원', image: '/images/sample-ppt.png'},
        {title: '발표', category: '멘토/코딩', price: '10,000원', image: '/images/sample-ppt.png'},
    ];
    function loadTalents(keyword = '') {
        // JS 더미카드만 추가
        const talentList = document.getElementById('talentList');
        // 기존 JS 더미카드만 삭제(Thymeleaf 카드 보존)
        talentList.querySelectorAll('.talent-card.js-dummy').forEach(e => e.remove());
        // 필터
        const filteredData = keyword ?
            sampleData.filter(talent => talent.title.includes(keyword)) :
            sampleData;
        filteredData.forEach(talent => {
            const card = document.createElement('div');
            card.className = 'talent-card js-dummy';
            card.innerHTML = `
                <img src="${talent.image}" alt="썸네일">
                <div class="talent-info">
                    <p class="talent-title">${talent.title}</p>
                    <p class="talent-price">${talent.price}</p>
                    <p class="talent-category">${talent.category}</p>
                </div>
            `;
            talentList.appendChild(card);
        });
    }
    function handleSearch() {
        const keyword = document.getElementById('searchInput').value.trim();
        loadTalents(keyword);
        document.getElementById('resultTitle').textContent = keyword ? `"${keyword}"에 대한 결과` : "최근 올라온 재능";
    }
    function setKeyword(keyword) {
        document.getElementById('searchInput').value = keyword;
        handleSearch();
    }
    document.getElementById('searchInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleSearch();
    });
    document.addEventListener('DOMContentLoaded', function() {
        loadTalents();
    });
</script>
</body>
</html>
