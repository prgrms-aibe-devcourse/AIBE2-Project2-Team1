<!-- src/main/resources/templates/talents/list.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재능 검색 | campy</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/talent.css}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #F6F1F1 !important;
        }
        body {
            min-height: 100vh;
            background-color: #F6F1F1;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 30px;
            margin-bottom: 100px;
        }
        .search-box {
            margin-bottom: 0px; /* 아래 여백 없애기 */
            padding-bottom: 0px;
        }

        .search-box p {
            font-weight: bold;
            font-size: 18px;
        }

        .search-input-wrapper {
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            border: 2px solid #00aacc;
            border-radius: 30px;
            margin-top: 10px;
            padding: 10px;
            background-color: #F6F1F1;
        }

        .search-input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            background-color: transparent;
            margin-left: 10px;
        }
        .search-button {
            width: 36px;
            height: 36px;
            background-color: #19A7CE;
            border: none;
            border-radius: 50px;
            padding: 0;
            margin-left: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-icon {
            width: 24px;
            height: 24px;

        }
        .search-box button:hover {
            background: #146C94;
        }
        .popular-keywords {
            margin-top: 12px;
            font-size: 14px;
            color: #888;
            margin-left: 8px;
            margin-bottom: 10px;
        }
        .popular-keywords span {
            color: #aaa;
        }
        .popular-keywords a {
            color: #888;
            text-decoration: none;
            margin-left: 8px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .popular-keywords a:hover {
            color: #19A7CE;
            text-decoration: underline;
        }
        .results-section {
            background-color: #fff;
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
        }

        .talent-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* ✅ 한 줄에 4개 */
            gap: 28px 20px;
            margin-top: 14px;
        }

        .talent-card {
            background-color: #fff;
            border: 2px solid #19A7CE;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%; /* 카드 높이 맞추기 */
        }

        .talent-card:hover {
            box-shadow: 0 6px 20px rgba(25,167,206,0.15);
        }

        .talent-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .talent-info {
            padding: 12px;
        }

        .talent-title {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 15px;
            line-height: 1.2;
        }

        .talent-price, .talent-category {
            color: #666;
            font-size: 14px;
        }

        .register-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            padding: 15px;
            background-color: #ccc;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            border-radius: 20px;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .register-button:hover {
            background-color: #146C94;
            color: white;
        }

        /* ✅ 반응형 그리드 처리 */
        @media (max-width: 1100px) {
            .results-section, .search-container, .register-button {
                width: 98vw;
                min-width: 320px;
                max-width: 900px;
            }
            .talent-list {
                grid-template-columns: repeat(3, 1fr); /* 태블릿 3개 */
            }
        }

        @media (max-width: 768px) {
            .talent-list {
                grid-template-columns: repeat(2, 1fr); /* 모바일 가로 2개 */
            }
        }

        @media (max-width: 480px) {
            .talent-list {
                grid-template-columns: 1fr; /* 모바일 세로 1개 */
            }
        }

    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="container">
    <div class="search-box">
        <p>어떤 재능을 원하시나요?</p>
        <div class="search-input-wrapper">
            <input type="text" id="search-input" placeholder="검색어를 입력해주세요">
            <button id="search-btn" class="search-button">
                <img src="/images/search-icon.png" alt="검색" class="search-icon">
            </button>
        </div>
        <div class="popular-keywords">
            <span>인기 검색어:</span>
            <a onclick="setKeyword('ppt')">ppt</a>
            <a onclick="setKeyword('컴퓨터 구조')">컴퓨터 구조</a>
            <a onclick="setKeyword('리눅스')">리눅스</a>
            <a onclick="setKeyword('과제')">과제</a>
            <a onclick="setKeyword('족보')">족보</a>
            <a onclick="setKeyword('스터디')">스터디</a>
            <a onclick="setKeyword('정리')">정리</a>
            <a onclick="setKeyword('요약')">요약</a>
            <a onclick="setKeyword('pdf')">pdf</a>
            <a onclick="setKeyword('발표')">발표</a>
        </div>
    </div>

    <!-- ✅ 기존 material-section → results-section -->
    <div class="results-section">
        <p style="font-weight: bold; font-size: 16px; margin-bottom: 20px;" id="resultTitle">최근 올라온 재능</p>

        <!-- ✅ 기존 material-list → talent-list -->
        <div class="talent-list" id="talentList">
            <!-- ✅ 기존 material-card → talent-card -->
            <a th:each="talent : ${talents}" th:href="@{/talents/{id}(id=${talent.talentId})}" style="text-decoration:none; color:inherit;">
                <div class="talent-card">
                    <img th:if="${talent.imagePath != null and !#strings.isEmpty(talent.imagePath)}"
                         th:src="@{|/uploads/${talent.imagePath}|}" alt="썸네일">
                    <img th:if="${talent.imagePath == null or #strings.isEmpty(talent.imagePath)}"
                         src="/images/sample-ppt.png" alt="썸네일">
                    <div class="talent-info">
                        <div class="talent-title" th:text="${talent.title}"></div>
                        <div class="talent-price" th:text="${#numbers.formatInteger(talent.price, 3, 'COMMA')} + '원'"></div>
                        <div class="talent-category" th:text="${talent.category}"></div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <div class="register-button" onclick="window.location.href='/talents/register'">
        재능 등록하기
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>


<!-- ✅ talents 데이터를 JS 변수로 넘기기 -->
<script th:inline="javascript">
    const realData = [[${talents}]];
</script>

<script>
    function loadTalents(keyword = '') {
        const talentList = document.getElementById('talentList');

        // 기존 카드 제거 (JS로 추가한 것만 삭제)
        talentList.querySelectorAll('.js-dynamic').forEach(e => e.remove());

        // 필터링
        const filteredData = keyword ?
            realData.filter(t => t.title.includes(keyword)) :
            realData;

        // 새로운 카드 생성
        filteredData.forEach(talent => {
            const a = document.createElement('a');
            a.href = `/talents/${talent.talentId}`;
            a.style.textDecoration = 'none';
            a.style.color = 'inherit';
            a.className = 'js-dynamic'; // 나중에 삭제용

            const card = document.createElement('div');
            card.className = 'talent-card';

            const img = document.createElement('img');
            img.src = talent.imagePath && talent.imagePath !== ''
                ? `/images/${talent.imagePath}`
                : '/images/sample-ppt.png';
            img.alt = '썸네일';
            card.appendChild(img);

            const info = document.createElement('div');
            info.className = 'talent-info';

            const title = document.createElement('div');
            title.className = 'talent-title';
            title.textContent = talent.title;
            info.appendChild(title);

            const price = document.createElement('div');
            price.className = 'talent-price';
            price.textContent = `${Number(talent.price).toLocaleString()}원`;
            info.appendChild(price);

            const category = document.createElement('div');
            category.className = 'talent-category';
            category.textContent = talent.category;
            info.appendChild(category);

            card.appendChild(info);
            a.appendChild(card);
            talentList.appendChild(a);
        });
    }

    function handleSearch() {
        const keyword = document.getElementById('search-input').value.trim();
        loadTalents(keyword);
        document.getElementById('resultTitle').textContent = keyword ? `"${keyword}"에 대한 결과` : "최근 올라온 재능";
    }

    function setKeyword(keyword) {
        document.getElementById('search-input').value = keyword;
        handleSearch();
    }

    document.addEventListener('DOMContentLoaded', function () {
        // 기존 서버 렌더 카드 삭제 (최초 검색 위해)
        document.querySelectorAll('#talentList > a').forEach(e => e.remove());
        loadTalents(); // 첫 렌더링
        document.getElementById('search-btn').addEventListener('click', handleSearch);
        document.getElementById('search-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSearch();
        });
    });
</script>

</body>
</html>
