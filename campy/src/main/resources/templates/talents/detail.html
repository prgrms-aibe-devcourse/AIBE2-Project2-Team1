<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${talent.title} + ' | campy'">재능 상세 | campy</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f4f4;
        }
        .container {
            display: flex;
            justify-content: space-between;
            max-width: 1200px;
            margin: 30px auto;
            gap: 20px;
        }
        .content-box {
            background: linear-gradient(to right, #50c1e1, #3A94B9);
            color: white;
            padding: 30px;
            border-radius: 12px;
            flex: 2;
            height: 250px
        }
        .info-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 250px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .thumbnail {
            width: 200px;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .price {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .label {
            font-size: 14px;
            color: #666;
        }
        .desc {
            font-size: 16px;
            margin: 5px 0 15px;
        }
        .btn-purchase {
            width: 100%;
            padding: 10px;
            background-color: #1B6B93;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 20px;
        }
        .tab {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            border-bottom: 2px solid #ccc;
        }
        .tab a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            padding-bottom: 10px;
        }
        .tab a.active {
            color: #1B6B93;
            border-bottom: 3px solid #1B6B93;
        }
        .section-title {
            font-weight: bold;
            font-size: 18px;
            margin: 20px 0 10px;
        }
        .section-desc li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<div class="container">
    <div style="flex: 3">
        <div class="content-box">
            <h2 th:text="${talent.title}">제목</h2>
            <p class="label" th:text="${talent.category}">카테고리</p>
            <p class="desc">
                <span th:text="${talent.user.nickname}">닉네임</span> ·
                <span th:text="${#temporals.format(talent.createdAt, 'yyyy-MM-dd HH:mm')}">등록일</span>
            </p>
        </div>

        <div class="tab">
            <a href="#" class="active">상세설명</a>
            <a href="#">후기</a>
        </div>

        <!-- 상세 설명 + 썸네일을 나란히 배치 -->
        <div>
            <p class="section-title">상세설명</p>
            <div style="display: flex; gap: 20px;">
                <div style="flex: 2;" th:utext="${#strings.replace(talent.description, '\n', '<br>')}">
                    상세 설명
                </div>
                <div style="flex-shrink: 0;">
                    <img class="thumbnail"
                         th:if="${talent.imagePath != null and !#strings.isEmpty(talent.imagePath)}"
                         th:src="@{|/images/${talent.imagePath}|}" alt="썸네일"
                         style="width: 240px; height: 180px; object-fit: cover; border-radius: 8px;">
                    <img class="thumbnail"
                         th:if="${talent.imagePath == null or #strings.isEmpty(talent.imagePath)}"
                         src="/images/sample-ppt.png" alt="썸네일"
                         style="width: 240px; height: 180px; object-fit: cover; border-radius: 8px;">
                </div>
            </div>
        </div>

    </div>

    <div style="flex: 1">
        <div class="info-box">
            <p class="price" th:text="${#numbers.formatInteger(talent.price, 3, 'COMMA')} + '원'">10,000원</p>

            <p class="label">
                <img src="/images/clock-icon.png" alt="횟수 아이콘" style="width:16px; vertical-align: middle; margin-right: 5px;">
                횟수: <span th:text="${talent.availableDays}">1회</span>
            </p>

            <p class="label">
                <img src="/images/chat-icon.png" alt="진행 방법 아이콘" style="width:16px; vertical-align: middle; margin-right: 5px;">
                진행 방법: <span th:text="${talent.offlineLocation != null ? talent.offlineLocation : '온라인'}">온라인</span>
            </p>

            <button class="btn-purchase"
                    th:onclick="|location.href='/payments/new?talentId=${talent.talentId}'|">구매하기</button>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
