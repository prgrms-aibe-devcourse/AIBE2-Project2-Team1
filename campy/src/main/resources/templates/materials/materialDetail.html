<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자료 상세</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: #F6F1F1;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 30px;
        }

        .search-box p {
            font-weight: bold;
            font-size: 18px;
        }

        .search-input-wrapper {
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            border: 2px solid #00aacc;
            border-radius: 30px;
            margin-top: 10px;
            padding: 10px;
            background-color: #F6F1F1;
        }

        .search-input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            background-color: transparent;
            margin-left: 10px;
        }

        .search-button {
            width: 36px;
            height: 36px;
            background-color: #1389b2;
            border: none;
            border-radius: 50px;
            padding: 0;
            margin-left: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-icon {
            width: 24px;
            height: 24px;
        }

        .detail-header {
            display: flex;
            background-color: #146C94;
            color: white;
            border-radius: 10px;
            padding: 30px;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .detail-info {
            flex: 1;
        }

        .detail-info .category {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .detail-info .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .detail-info .date {
            font-size: 14px;
        }

        .thumbnail {
            width: 200px;
            height: 250px;
            object-fit: cover;
            margin-left: 30px;
            border-radius: 10px;
        }

        .detail-description .description-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .description-text {
            flex: 1;
        }


        .detail-description h3 {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .buy-button {
            display: inline-block;
            margin-top: 20px;
            background-color: #146C94;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .buy-button:hover {
            background-color: #0d4c6b;
        }


         .tab {
             margin-top: 30px;
             display: flex;
             gap: 20px;
             border-bottom: 2px solid #ccc;
         }

        .tab a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            padding-bottom: 10px;
        }

        .tab a.active {
            color: #1B6B93;
            border-bottom: 3px solid #1B6B93;
        }

        .tab-content {
            background-color: transparent;
            padding: 20px 0;
        }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container">
    <div class="search-box">
        <p>어떤 자료를 원하시나요?</p>
        <form th:action="@{/materials}" method="get" class="search-input-wrapper">
            <input type="text" name="keyword" placeholder="검색어를 입력해주세요">
            <button type="submit" class="search-button">
                <img src="/images/search-icon.png" alt="검색" class="search-icon">
            </button>
        </form>
    </div>

    <div class="detail-header">
        <div class="detail-info">
            <div class="category" th:text="${material.category}">JAVA</div>
            <div class="title" th:text="${material.title}">00대학교 000교수님 JAVA강의의 25-1 족보</div>
            <p th:text="${material.formattedCreatedAt}"></p>
        </div>
        <img class="thumbnail" th:src="@{'/uploads/' + ${material.thumbnailUrl}}" alt="썸네일">
    </div>

    <div class="tab">
        <a href="#detail" class="active" onclick="showTab(event, 'detail')">상세설명</a>
        <a href="#review" onclick="showTab(event, 'review')">후기</a>
    </div>

    <div class="detail-description">

        <!-- 상세설명 탭 -->
        <div id="detail" class="tab-content" style="display: block;">
            <div class="description-wrapper">
                <div class="description-text">
                    <p th:text="${material.content}">
                        00대학교 000교수님 JAVA 강의 1학기 족보 팔아요 A+ 받음여
                    </p>
                </div>
                <a th:href="@{'/materials/' + ${material.materialId} + '/purchase'}" class="buy-button">구매하기 →</a>
            </div>
        </div>

        <!-- 후기 탭 -->
        <div id="review" class="tab-content" style="display: none;">
            <p>아직 후기가 없습니다.</p>
        </div>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<script>
    function showTab(evt, tabId) {
        // 모든 탭 콘텐츠 숨기기
        document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');

        // 모든 탭 비활성화
        document.querySelectorAll('.tab a').forEach(link => link.classList.remove('active'));

        // 선택된 탭 보이기 및 탭 활성화
        document.getElementById(tabId).style.display = 'block';
        evt.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
