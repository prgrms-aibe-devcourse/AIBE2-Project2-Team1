<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>게시판</title>
    <link rel="stylesheet" th:href="@{/css/board.css}">
</head>
<body>

<h2>게시판</h2>

<div class="search-bar">
    <form th:action="@{/board/listBoard}" method="get">
        <select name="type">
            <option value="title">제목</option>
            <option value="writer">작성자</option>
            <option value="category">카테고리</option>
            <option value="content">내용</option>
            <option value="university">학교명</option>
        </select>
        <input type="text" name="keyword" placeholder="검색어를 입력하세요" />
        <button type="submit">검색</button>
    </form>
    <button class="write-button" th:onclick="|location.href='@{/board/writeBoard}'|">글쓰기</button>
</div>

<table class="board-table">
    <colgroup>
        <col style="width: 3%">
        <col style="width: 10%">
        <col style="width: 8%">
        <col style="width: 51%">
        <col style="width: 10%">
        <col style="width: 10%">
    </colgroup>
    <thead>
    <tr>
        <th>NO</th>
        <th>UNIVERSITY</th>
        <th>CATEGORY</th>
        <th>TITLE</th>
        <th>NAME</th>
        <th>DATE</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${boardList}" th:onclick="|location.href='@{/board/readBoard/{id}(id=${post.boardId})}'|">
        <td th:text="${post.boardId}">1</td>
        <td th:text="${post.school}">학교명</td>
        <td th:text="${post.category}">잡담</td>
        <td th:text="${post.title}">게시글 제목</td>
        <td th:text="${post.username}">작성자</td>
        <td th:text="${post.createdAt}">9999-12-31</td>
    </tr>
    </tbody>
</table>

<div class="pagination">
    <!-- 간단한 페이징 예시 -->
    <span th:if="${hasPrevious}">
    <a th:href="@{/board/list(page=${currentPage - 1})}">«</a>
  </span>
    <span th:if="${totalPages != null}" th:each="i : ${#numbers.sequence(1, totalPages)}">
    <a th:href="@{/board/list(page=${i})}"
       th:classappend="${i == currentPage} ? 'active'" th:text="${i}">1</a>
  </span>
    <span th:if="${hasNext}">
    <a th:href="@{/board/list(page=${currentPage + 1})}">»</a>
  </span>
</div>


</body>
</html>
