
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>멘토 리스트</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: #F6F1F1;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 30px;
        }

        .search-box {
            margin-bottom: 30px;
        }

        .search-box p {
            font-weight: bold;
            font-size: 18px;
        }

        .search-input-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 30px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            border: 2px solid #00aacc;
            border-radius: 30px;
            padding: 10px;
            background-color: #F6F1F1;
        }

        .search-input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            background-color: transparent;
        }
        .search-button {
            background-color: #19A7CE;
            border: none;
            color: white;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.2s ease;
        }
        .search-button:hover {
            background-color: #146c94;
        }

        .search-button {
            width: 36px; /* 원하는 너비 */
            height: 36px; /* 원하는 높이 */
            background-color: #1389b2;
            border: none;
            padding: 0;
            margin-left: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-icon {
            width: 24px;
            height: 24px;
        }



        .tag-list {
            margin-top: 10px;
        }

        .tag {
            display: inline-block;
            background-color: #19A7CE;
            color: white;
            padding: 5px 10px;
            border-radius: 12px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
        }

        .side-images {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-images .image-wrapper {
            position: relative;
            border: 2px solid #19A7CE;
            border-radius: 20px;
            overflow: hidden;
            background-color: white;
            width: 150px;
            height: 150px;
        }

        .side-images .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 20px;
        }

        .side-images .image-wrapper .side-button {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #19A7CE;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            padding: 6px 20px; /* ← 가로로 길게 */
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            white-space: nowrap; /* 버튼 텍스트 줄바꿈 방지 */
            width: auto; /* 너비 자동 조정 */
            max-width: 80%; /* 부모 크기 넘지 않게 */
        }

        .side-images .image-wrapper .side-button:hover {
            background-color: #1389b2;
        }

        .mentor-section {
            display: flex;
            gap: 30px;
        }

        .mentor-list-wrapper {
            background-color: #fff;
            padding: 30px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .mentor-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
        }

        .mentor-card {

            display: flex;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            background-color: #fff;
        }

        .mentor-card .card-content {
            flex: 1;
            padding: 15px;
        }

        .mentor-card .card-title {
            font-weight: bold;
            font-size: 16px;
        }

        .mentor-card .card-tags {
            color: #0077aa;
            font-size: 13px;
        }

        .mentor-card .card-image {
            width: 160px;
            height: 80px;
            text-align: center;
            background-color: #f9f9f9;
            flex-direction: column; /* 세로 정렬 */
            align-items: center;
            justify-content: flex-start; /* 이미지 위, 텍스트 아래로 */

        }

        .mentor-card .card-image img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }


        .mentor-card .card-image p {
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<!-- Header Fragment (메인과 합칠 때 복구) -->
<!-- <div th:replace="fragments/header :: header"></div> -->
<div class="container">
    <div class="search-box">
        <p>어떤 멘토를 원하시나요?
            <span style="color: #0077aa; font-size: 14px;">#태그 작성후  엔터를 누르시면 태그로 검색하실 수 있어요!</span>
        </p>
        <div class="search-input-wrapper">
            <input type="text" id="search-input" placeholder="검색어를 입력해주세요" autocomplete="off">
            <button id="search-btn" class="search-button">
                <img src="/images/search-icon.png" alt="검색" class="search-icon">
            </button>
        </div>


        <div class="tag-list" id="tag-list"></div>
    </div>

    <div class="mentor-section">
        <div class="side-images">
            <div class="image-wrapper">
                <img src="/images/ai-mento.png" alt="AI 멘토 매칭하기">
                <a href="/ai/start" class="side-button">AI 멘토 매칭하기</a>
            </div>
            <div class="image-wrapper">
                <img src="/images/mentor-register.png" alt="수업 등록하기">
                <a href="/newClass" class="side-button">수업 등록하기</a>
            </div>
        </div>

        <div class="mentor-list-wrapper" style="flex: 2.5;">
            <div th:each="mentor : ${offerPage.content}" class="mentor-card"
                 th:attr="data-id=${mentor.offerId}">
                <div class="card-content">
                    <!-- 멘토 닉네임 -->
                    <p class="mentor-name" th:text="${mentor.user.nickname}"></p>
                    <!-- 멘토링 제목 -->
                    <div class="card-title" th:text="${mentor.title}"></div>

                    <!-- ⭐ 별점은 아직 값 없음: 자리만 남겨둠 -->
                    <p style="color: goldenrod;">
                        <span th:text="'⭐ '"></span>
                    </p>

                    <!-- 설명 -->
                    <p th:text="${mentor.description}"></p>
                    <!-- 태그: tagList가 List<String>이면 join해서 출력 -->
                    <p class="card-tags"
                       th:if="${mentor.tags != null}"
                       th:text="${#strings.listJoin(mentor.tags, ' ')}"></p>
                </div>
                <div class="card-image">
                    <!-- 프로필 이미지: 값이 있으면 출력, 없으면 기본 이미지 -->
                    <<img th:if="${mentor.user != null && mentor.user.profileImg != null && mentor.user.profileImg != ''}"
                          th:src="@{${mentor.user.profileImg}}"
                          th:alt="${mentor.user.nickname}">
                    <img th:if="${mentor.user == null || mentor.user.profileImg == null || mentor.user.profileImg == ''}"
                         th:src="@{/images/default-mentor.png}"
                         th:alt="기본이미지">
                </div>
            </div>
        </div>

        <!-- 페이지네이션 버튼 -->
        <div class="pagination" style="text-align: center; margin-top: 30px;">
            <!-- 이전 페이지 -->
            <a th:if="${offerPage.hasPrevious()}"
               th:href="@{|/classList?page=${offerPage.number - 1}&size=${offerPage.size}|}">이전</a>

            <!-- 페이지 번호들 -->
            <span th:each="i : ${#numbers.sequence(0, offerPage.totalPages - 1)}">
                <a th:if="${i != offerPage.number}"
                   th:href="@{|/classList?page=${i}&size=${offerPage.size}|}"
                   th:text="${i + 1}">1</a>
                <span th:if="${i == offerPage.number}" th:text="${i + 1}" style="font-weight:bold;"></span>
             </span>

            <!-- 다음 페이지 -->
            <a th:if="${offerPage.hasNext()}"
               th:href="@{|/classList?page=${offerPage.number + 1}&size=${offerPage.size}|}">다음</a>
        </div>
    </div>
</div>

<script>
    const searchInput = document.getElementById('search-input');
    const tagList = document.getElementById('tag-list');
    let selectedTags = [];

    searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const value = searchInput.value.trim();
            if (!value) return;

            if (value.startsWith('#')) {
                addTag(value);
            } else {
                selectedTags = [];
                tagList.innerHTML = '';
                filterByKeyword(value);
            }
            searchInput.value = '';
        }
    });

    function addTag(tag) {
        if (selectedTags.includes(tag)) return;
        selectedTags.push(tag);
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = tag;

        span.addEventListener('click', () => {
            span.remove();
            selectedTags = selectedTags.filter(t => t !== tag);
            filterCards();
        });

        tagList.appendChild(span);
        filterCards();
    }

    function filterByKeyword(keyword) {
        const cards = document.querySelectorAll('.mentor-card');
        cards.forEach(card => {
            const title = card.querySelector('.card-title').textContent;
            card.style.display = title.includes(keyword) ? 'flex' : 'none';
        });
    }

    function filterCards() {
        const cards = document.querySelectorAll('.mentor-card');
        cards.forEach(card => {
            const tagsText = card.getAttribute('data-tags');
            const hasAllTags = selectedTags.every(tag => tagsText.includes(tag.replace('#', '')));
            card.style.display = hasAllTags ? 'flex' : 'none';
        });
    }

    // 검색 버튼 클릭 시도 동일하게 처리
    document.getElementById('search-btn').addEventListener('click', () => {
        const value = searchInput.value.trim();
        if (!value) return;

        if (value.startsWith('#')) {
            addTag(value);
        } else {
            selectedTags = [];
            tagList.innerHTML = '';
            filterByKeyword(value);
        }
        searchInput.value = '';
    });

    // 카드 클릭 시 상세 페이지 이동
    document.querySelectorAll('.mentor-card').forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', () => {
            const id = card.getAttribute('data-id');
            window.location.href = `/class/detail/${id}`;
        });
    });

</script>
<!-- Footer Fragment (메인과 합칠때 복구) -->
<!-- <div th:replace="fragments/footer :: footer"></div> -->
</body>
</html>
