
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>멘토 리스트</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: #F6F1F1;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 30px;
        }

        .search-box {
            margin-bottom: 30px;
        }

        .search-box p {
            font-weight: bold;
            font-size: 18px;
        }

        .search-input-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 30px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            border: 2px solid #00aacc;
            border-radius: 30px;
            padding: 10px;
            background-color: #F6F1F1;
        }

        .search-input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            background-color: transparent;
        }
        .search-button {
            background-color: #19A7CE;
            border: none;
            color: white;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.2s ease;
        }
        .search-button:hover {
            background-color: #146c94;
        }

        .search-button {
            width: 36px; /* 원하는 너비 */
            height: 36px; /* 원하는 높이 */
            background-color: #1389b2;
            border: none;
            padding: 0;
            margin-left: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-icon {
            width: 24px;
            height: 24px;
        }



        .tag-list {
            margin-top: 10px;
        }

        .tag {
            display: inline-block;
            background-color: #19A7CE;
            color: white;
            padding: 5px 10px;
            border-radius: 12px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
        }

        .side-images {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-images .image-wrapper {
            position: relative;
            border: 2px solid #19A7CE;
            border-radius: 20px;
            overflow: hidden;
            background-color: white;
            width: 150px;
            height: 150px;
        }

        .side-images .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 20px;
        }

        .side-images .image-wrapper .side-button {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #19A7CE;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            padding: 6px 20px; /* ← 가로로 길게 */
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            white-space: nowrap; /* 버튼 텍스트 줄바꿈 방지 */
            width: auto; /* 너비 자동 조정 */
            max-width: 80%; /* 부모 크기 넘지 않게 */
        }

        .side-images .image-wrapper .side-button:hover {
            background-color: #1389b2;
        }

        .mentor-section {
            display: flex;
            gap: 30px;
        }

        .mentor-list-wrapper {
            background-color: #fff;
            padding: 30px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .mentor-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
        }

        .mentor-card {
            display: flex;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            background-color: #fff;
            cursor: pointer;
        }

        .mentor-card .card-content {
            flex: 1;
            padding: 15px;
        }

        .mentor-card .card-title {
            font-weight: bold;
            font-size: 16px;
        }

        .mentor-card .card-tags {
            color: #0077aa;
            font-size: 13px;
        }

        .mentor-card .card-image {
            width: 160px;
            height: 80px;
            text-align: center;
            background-color: #f9f9f9;
        }

        .mentor-card .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mentor-card .card-image p {
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<!-- Header Fragment (메인과 합칠 때 복구) -->
<!-- <div th:replace="fragments/header :: header"></div> -->
<div class="container">
    <div class="search-box">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <h2>수업 등록 내역</h2>
            <div style="text-align: right;">
                <div>멘토 : 승인/거절 버튼</div>
                <div>구매자 : 취소 버튼</div>
            </div>
        </div>

        <!-- 역할 선택 + 검색창 -->
        <div class="search-input-wrapper">
            <label for="role-select" style="font-weight: bold; font-size: 16px;">역할 선택:</label>
            <select id="role-select" style="padding: 6px 10px; border-radius: 6px; border: 1px solid #ccc;">
                <option value="">전체</option>
                <option value="MENTOR">멘토로 참여</option>
                <option value="MENTEE">멘티로 참여</option>
            </select>

            <input type="text" id="search-input" name="keyword" placeholder="검색어를 입력해주세요">
            <button type="button" id="search-btn">검색</button>
        </div>
        </div>

        <hr style="border: none; border-top: 2px solid #333;">

        <div class="tag-list" id="tag-list"></div>
    </div>

    <div class="mentor-section">
        <div class="side-images">
            <div class="image-wrapper">
                <img src="/images/ai-mento.png" alt="AI 멘토 매칭하기">
                <a href="/ai/start" class="side-button">AI 멘토 매칭하기</a>
            </div>
            <div class="image-wrapper">
                <img src="/images/mentor-register.png" alt="수업 등록하기">
                <a href="/class/create" class="side-button">수업 등록하기</a>
            </div>
        </div>

        <div class="mentor-list-wrapper" style="flex: 2.5;">
            <div th:each="mentor : ${offerList}" class="mentor-card"
                 th:attr="data-id=${mentor.offerId}">
                <div class="card-content">
                    <!-- 멘토 닉네임 -->
                    <p class="mentor-name" th:text="${mentor.user.nickname}"></p>
                    <!-- 멘토링 제목 -->
                    <div class="card-title" th:text="${mentor.title}"></div>

                    <!-- ⭐ 별점은 아직 값 없음: 자리만 남겨둠 -->
                    <p style="color: goldenrod;">
                        <span th:text="'⭐ '"></span>
                    </p>

                    <!-- 설명 -->
                    <p th:text="${mentor.description}"></p>
                    <!-- 태그: tagList가 List<String>이면 join해서 출력 -->
                    <p class="card-tags"
                       th:if="${mentor.tags != null}"
                       th:text="${#strings.listJoin(mentor.tags, ' ')}"></p>
                </div>
                <div class="card-image">
                    <!-- 프로필 이미지: 값이 있으면 출력, 없으면 기본 이미지 -->
                    <img th:if="${mentor.user != null && mentor.user.profileImg != null && !#strings.isEmpty(mentor.user.profileImg)}"
                         th:src="${mentor.user.profileImg}"
                         th:alt="${mentor.user.nickname}">

                    <!-- 사용자 이미지 없을 때 -->
                    <img th:if="${mentor.user == null || mentor.user.profileImg == null || #strings.isEmpty(mentor.user.profileImg)}"
                         th:src="@{/images/default-mentor.png}"
                         th:alt="기본이미지">
                </div>
            </div>
        </div>


    </div>
</div>

<script>
    const searchInput = document.getElementById('search-input');
    const tagList = document.getElementById('tag-list');
    let selectedTags = [];

    searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const value = searchInput.value.trim();
            if (!value) return;

            if (value.startsWith('#')) {
                addTag(value);
            } else {
                selectedTags = [];
                tagList.innerHTML = '';
                filterByKeyword(value);
            }
            searchInput.value = '';
        }
    });

    function addTag(tag) {
        if (selectedTags.includes(tag)) return;
        selectedTags.push(tag);
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = tag;

        span.addEventListener('click', () => {
            span.remove();
            selectedTags = selectedTags.filter(t => t !== tag);
            filterCards();
        });

        tagList.appendChild(span);
        filterCards();
    }

    function filterByKeyword(keyword) {
        const cards = document.querySelectorAll('.mentor-card');
        cards.forEach(card => {
            const title = card.querySelector('.card-title').textContent;
            card.style.display = title.includes(keyword) ? 'flex' : 'none';
        });
    }

    function filterCards() {
        const cards = document.querySelectorAll('.mentor-card');
        cards.forEach(card => {
            const tagsText = card.getAttribute('data-tags');
            const hasAllTags = selectedTags.every(tag => tagsText.includes(tag.replace('#', '')));
            card.style.display = hasAllTags ? 'flex' : 'none';
        });
    }

    // 검색 버튼 클릭 시도 동일하게 처리
    document.getElementById('search-btn').addEventListener('click', () => {
        const value = searchInput.value.trim();
        if (!value) return;

        if (value.startsWith('#')) {
            addTag(value);
        } else {
            selectedTags = [];
            tagList.innerHTML = '';
            filterByKeyword(value);
        }
        searchInput.value = '';
    });

    // 카드 클릭 시 상세 페이지 이동
    document.querySelectorAll('.mentor-card').forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', () => {
            const id = card.getAttribute('data-id');
            window.location.href = `/class/detail/${id}`;
        });
    });

</script>

<script th:inline="javascript">
    // 서버에서 전달된 데이터
    const matchMembers = /*[[${matchMemberlist}]]*/ [];
    const matchList = /*[[${matchList}]]*/ [];
    const offerList = /*[[${offerList}]]*/ [];

    console.log("matchMembers", matchMembers);
    console.log("matchList", matchList);
    console.log("offerList", offerList);

    // matchId → offer 매핑을 위한 Map 생성
    const matchIdToOffer = new Map();
    matchList.forEach((match, index) => {
        matchIdToOffer.set(match.matchId, offerList[index]); // 인덱스 기준 대응
    });

    // 역할에 따라 필터링 후 렌더링
    function renderMatchesByRole(role) {
        const container = document.getElementById("match-container");
        container.innerHTML = '';

        const filtered = role
            ? matchMembers.filter(m => m.role === role)
            : matchMembers;

        if (filtered.length === 0) {
            container.innerHTML = '<p>해당 역할에 해당하는 수업이 없습니다.</p>';
            return;
        }

        filtered.forEach(member => {
            const offer = matchIdToOffer.get(member.matchId);
            if (!offer) return;

            const div = document.createElement('div');
            div.className = "match-card";
            div.innerHTML = `
                <h3>${offer.title}</h3>
                <p>설명: ${offer.description}</p>
                <p>가격: ${offer.price}원</p>
                <p>역할: ${member.role === 'MENTOR' ? '멘토' : '멘티'}</p>
            `;
            container.appendChild(div);
        });
    }

    // 이벤트 핸들링
    document.getElementById("role-select").addEventListener("change", (e) => {
        renderMatchesByRole(e.target.value);
    });

    // 초기 전체 렌더링
    renderMatchesByRole('');
</script>

<!-- Footer Fragment (메인과 합칠때 복구) -->
<!-- <div th:replace="fragments/footer :: footer"></div> -->
</body>
</html>
