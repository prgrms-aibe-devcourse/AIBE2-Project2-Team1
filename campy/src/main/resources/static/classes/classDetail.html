<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>수업 상세 페이지</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f4f4;
        }
        .container {
            display: flex;
            justify-content: space-between;
            max-width: 1200px;
            margin: 30px auto;
            gap: 20px;
        }
        .content-box {
            background: linear-gradient(to right, #3eb0ce, #3A94B9);
            color: white;
            padding: 30px;
            border-radius: 12px;
            flex: 2;
        }
        .info-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 250px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .mentor-profile {
            margin-top: 20px;
            background: #146C94;
            color: white;
            padding: 15px;
            border-radius: 12px;
        }
        .mentor-profile img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }
        .price {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .label {
            font-size: 14px;
            color: #666;
        }
        .desc {
            font-size: 16px;
            margin: 5px 0 15px;
        }
        .btn-purchase, .btn-message, .btn-profile {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-purchase {
            background-color: #1B6B93;
            color: white;
        }
        .btn-message {
            background-color: #F6F1F1;
            color: #1B6B93;
            border: 1px solid #1B6B93;
        }
        .btn-profile {
            background-color: white;
            color: #1B6B93;
            border: 1px solid #fff;
        }
        .tab {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            border-bottom: 2px solid #ccc;
        }
        .tab a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            padding-bottom: 10px;
        }
        .tab a.active {
            color: #1B6B93;
            border-bottom: 3px solid #1B6B93;
        }
        .section-title {
            font-weight: bold;
            font-size: 18px;
            margin: 20px 0 10px;
        }
        .section-desc li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<!-- Header Fragment (메인과 합칠 때 복구) -->
<!-- <div th:replace="fragments/header :: header"></div> -->
<div class="container">
    <div style="flex: 3">
        <div class="content-box">
            <h2 id="class-title">제목 로딩중...</h2>
            <p class="label" id="class-category">카테고리 로딩중...</p>
            <p class="desc" id="class-summary">
                • 실제 상담 시작은 상호 협의하에 진행됩니다.<br>
                • 음성/영상통화를 기본적으로 제공하며, 전문가와 협의하에 진행 방식을 결정할 수 있습니다.
            </p>
        </div>

        <div class="tab">
            <a href="#" class="active">상세설명</a>
            <a href="/review">후기</a>
        </div>

        <div>
            <p class="section-title">상세설명</p>
            <ul class="section-desc" id="class-desc-list">
                <!-- 여기에 상세 설명 동적으로 삽입 -->
            </ul>
        </div>
    </div>

    <div style="flex: 1">
        <div class="info-box">
            <p class="price" id="class-price">-</p>
            <p class="label">1회</p>
            <p class="label">진행 방법</p>
            <p class="desc" id="class-method">-</p>
            <button class="btn-purchase" id="btn-purchase">구매하기</button>
            <button class="btn-message" id="btn-message">쪽지하기</button>
        </div>

        <div class="mentor-profile">
            <h4 id="mentor-name">-</h4>
            <p id="mentor-expertise">-</p>
            <img id="mentor-img" src="/images/default-mentor.png" alt="멘토 사진">
            <button class="btn-profile" id="btn-profile">프로필보기</button>
        </div>
    </div>
</div>
<!-- Footer Fragment (메인과 합칠때 복구) -->
<!-- <div th:replace="fragments/footer :: footer"></div> -->

<script>
    // 쿼리스트링에서 id 추출 (ex: classDetail.html?id=3)
    const offerId = new URLSearchParams(window.location.search).get("id");
    if (!offerId) {
        alert("잘못된 접근입니다.");
        window.history.back();
    }

    // 상세 API 호출
    fetch(`/api/mentoring-offers/${offerId}`)
        .then(res => res.json())
        .then(data => {
            // 클래스(수업) 정보 세팅
            document.getElementById('class-title').textContent = data.title;
            document.getElementById('class-category').textContent = data.category || '-';
            document.getElementById('class-price').textContent = (data.price ? data.price.toLocaleString() : '-') + "원";
            document.getElementById('class-method').textContent = data.method || '-';

            // 상세 설명(예: 배열이면 리스트로 표시, 아니면 한줄로 표시)
            const descList = document.getElementById('class-desc-list');
            descList.innerHTML = "";
            if (Array.isArray(data.details) && data.details.length > 0) {
                data.details.forEach(d => {
                    const li = document.createElement("li");
                    li.textContent = d;
                    descList.appendChild(li);
                });
            } else {
                const li = document.createElement("li");
                li.textContent = data.description || '-';
                descList.appendChild(li);
            }

            // 멘토 정보
            document.getElementById('mentor-name').textContent = (data.user?.name || '이름없음') + ' 멘토';
            document.getElementById('mentor-expertise').textContent = data.user?.expertise || '-';
            document.getElementById('mentor-img').src = data.user?.profileImg || '/images/default-mentor.png';

            // 버튼 클릭 동작
            document.getElementById('btn-purchase').onclick = () => location.href = '/class/purchase';
            document.getElementById('btn-message').onclick = () => location.href = '/message.html';
            document.getElementById('btn-profile').onclick = () => {
                // 멘토 id가 있으면 프로필로 이동
                if (data.user?.userId) location.href = `/mentorDetail.html?id=${data.user.userId}`;
                else alert('멘토 정보가 없습니다');
            };
        })
        .catch(err => {
            alert("상세정보를 불러오지 못했습니다.");
            console.error(err);
        });
</script>
</body>
</html>
